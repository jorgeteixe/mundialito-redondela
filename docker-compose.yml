services:
  postgres:
    container_name: mundialito-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mundialito
      POSTGRES_USER: mundialito
      POSTGRES_PASSWORD: mundialito
    networks:
      - mundialito
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    name: mundialito-db

networks:
  mundialito:
    name: mundialito
