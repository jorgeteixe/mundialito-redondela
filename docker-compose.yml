services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mundialito
      POSTGRES_USER: mundialito
      POSTGRES_PASSWORD: mundialito
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sh:/docker-entrypoint-initdb.d/init.sh

volumes:
  postgres_data:
