name: Deploy Trigger.dev Jobs

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-trigger-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy jobs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      TRIGGER_API_URL: ${{ vars.TRIGGER_API_URL }}
      TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
      # Push the deploy image to ghcr using the built-in token (no PAT needed).
      # The Trigger CLI uses these directly and skips webapp-generated registry creds.
      TRIGGER_DOCKER_USERNAME: ${{ github.actor }}
      TRIGGER_DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail fast if the runtime Remotion bundle can't resolve a module from the
      # deployed dependency graph (compositions are shipped as raw source and
      # re-bundled at run time, so missing deps surface only when the task runs).
      - name: Verify deploy bundle resolves
        run: pnpm --filter @mr/jobs run verify:deploy

      - name: Deploy Trigger.dev jobs
        run: pnpm --filter @mr/jobs run deploy -- --local-build --skip-update-check
