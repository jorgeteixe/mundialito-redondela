name: Deploy Trigger.dev Jobs

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-trigger-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy jobs
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      TRIGGER_API_URL: ${{ vars.TRIGGER_API_URL }}
      TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
      TRIGGER_PROJECT_REF: ${{ vars.TRIGGER_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Trigger.dev jobs
        run: pnpm --filter @mr/jobs run deploy -- --skip-update-check
